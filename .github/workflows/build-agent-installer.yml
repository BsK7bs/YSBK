name: Build Windows Agent Installer

# Produces the sole shipping artifact of the Digital Twin desktop agent:
#   DigitalTwinAgentSetup.exe
#
# Triggers:
#   * push tag v*        -> also uploads to the matching GitHub Release
#   * workflow_dispatch  -> manual build (optionally with a custom backend URL)
#
# The backend URL is baked into the installer at build time via
# DIGITAL_TWIN_BACKEND_URL, so the compiled EXE knows where to phone home.
#
# CRITICAL: A "successful" PyInstaller run is NOT sufficient. The workflow
# runs an on-runner smoke test (`--self-test`) against every produced EXE so
# a botched relative-import can never ship again. See
# "Smoke-test frozen EXEs" below.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Backend URL to bake into the installer (default: repo secret)"
        required: false
        default: ""

permissions:
  contents: write

env:
  # Pin the interpreter for the whole job so `python`, `python -m pip`, and
  # the interpreter used by test_installer_imports.py are the SAME one.
  # setup-python@v5 sets $pythonLocation to the resolved install dir, which
  # we re-export as PYTHON_EXE for explicit `& $env:PYTHON_EXE ...` calls.
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  build:
    name: Build DigitalTwinAgentSetup.exe (Windows)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11 (x64)
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Publish resolved Python path
        shell: pwsh
        run: |
          # actions/setup-python exports $pythonLocation. We re-export it as
          # PYTHON_EXE so every subsequent step invokes the exact same Python.
          $exe = Join-Path "${{ steps.setup-python.outputs.python-path }}" ""
          if ([string]::IsNullOrWhiteSpace("${{ steps.setup-python.outputs.python-path }}")) {
              $exe = (Get-Command python).Source
          } else {
              $exe = "${{ steps.setup-python.outputs.python-path }}"
          }
          Write-Host "PYTHON_EXE = $exe"
          "PYTHON_EXE=$exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $exe --version
          & $exe -c "import sys, platform; print('sys.executable =', sys.executable); print('platform =', platform.platform())"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-py311-${{ hashFiles('agent_v2/requirements.txt') }}

      - name: Install build + runtime dependencies (BEFORE any static analysis)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Use `python -m pip` throughout so pip installs into the interpreter
          # that will later run test_installer_imports.py — never the system pip.
          & $env:PYTHON_EXE -m pip install --upgrade pip wheel setuptools
          & $env:PYTHON_EXE -m pip install pyinstaller==6.6.0
          & $env:PYTHON_EXE -m pip install -r "$env:GITHUB_WORKSPACE\agent_v2\requirements.txt"
          if ($LASTEXITCODE -ne 0) { throw "pip install failed rc=$LASTEXITCODE" }

      - name: Finalise pywin32 (register win32event / servicemanager DLLs)
        shell: pwsh
        run: |
          # pywin32 ships COM DLLs that must be registered with
          # pywin32_postinstall so `import win32event`, `import
          # servicemanager`, etc. resolve at runtime. Some GitHub Actions
          # cache paths skip this step; run it explicitly.
          $script = & $env:PYTHON_EXE -c "import pywin32_system32, os, pywin32_bootstrap; print('bootstrapped')" 2>&1
          try {
              & $env:PYTHON_EXE -m pywin32_postinstall -install
          } catch {
              Write-Host "::warning::pywin32_postinstall -install returned $($_.Exception.Message) — continuing (usually harmless on hosted runners)"
          }
          & $env:PYTHON_EXE -c "import win32event, win32service, win32api, servicemanager; print('pywin32 OK')"

      - name: Diagnostic — pip list (verify build-time deps are on THIS interpreter)
        shell: pwsh
        run: |
          Write-Host "== $env:PYTHON_EXE -m pip list =="
          & $env:PYTHON_EXE -m pip list
          Write-Host ""
          Write-Host "== presence check (build-time deps only) =="
          # The runtime self-test uses stdlib only, so this check is scoped
          # to the packages PyInstaller and the frozen EXEs actually need
          # to be BUILT (not to boot for --self-test). httpx/pywin32/etc.
          # are still required at runtime for real install operations, but
          # not for --version / --self-test.
          $required = @("pyinstaller", "httpx", "pywin32", "websockets", "pydantic", "psutil", "wmi")
          $missing  = @()
          foreach ($pkg in $required) {
              & $env:PYTHON_EXE -m pip show $pkg *>&1 | Out-Null
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "MISSING: $pkg"
                  $missing += $pkg
              } else {
                  $ver = (& $env:PYTHON_EXE -m pip show $pkg | Select-String "^Version:").ToString().Trim()
                  Write-Host "  present: $pkg $ver"
              }
          }
          if ($missing.Count -gt 0) {
              throw ("Required build-time packages missing on the interpreter: " + ($missing -join ", "))
          }

      - name: Resolve backend URL
        id: cfg
        shell: pwsh
        run: |
          $url = "${{ github.event.inputs.backend_url }}"
          if ([string]::IsNullOrWhiteSpace($url)) {
              $url = "${{ secrets.DIGITAL_TWIN_BACKEND_URL }}"
          }
          if ([string]::IsNullOrWhiteSpace($url)) {
              if ($env:GITHUB_REF -like "refs/tags/v*") {
                  throw "DIGITAL_TWIN_BACKEND_URL is not set. Refusing to publish a tagged release with a placeholder backend URL. Add the secret in Settings -> Secrets and variables -> Actions."
              }
              $url = "https://cloud.digitaltwin.example"
              Write-Host "::warning::No backend URL provided; using placeholder $url (non-release build)"
          }
          "backend_url=$url" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Backend URL baked into installer: $url"

      # ------------------------------------------------------------------
      # Static analysis: (A) AST relative-import check + (B) runtime
      # self-test.
      #
      # The runtime self-test intentionally uses ONLY stdlib imports —
      # it does not touch httpx, pywin32, tkinter, websockets, pydantic
      # or any other third-party dep. So this step is safe to run even
      # before pip install has completed (but we install first anyway
      # because PyInstaller and the build itself need those wheels).
      # ------------------------------------------------------------------
      - name: Static analysis (reject relative imports & prove entry-points boot)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & $env:PYTHON_EXE "$env:GITHUB_WORKSPACE\test_installer_imports.py"
          if ($LASTEXITCODE -ne 0) {
              throw "test_installer_imports.py failed rc=$LASTEXITCODE"
          }

      # -----------------------------------------------------------------
      # Pre-build source verification. Print the exact entry files
      # PyInstaller will freeze, their SHA-256s, and grep for the
      # current fast-path marker '[installer.boot]'. If any entry does
      # not contain the marker, the job fails BEFORE PyInstaller runs
      # so no broken EXE can ever ship.
      #
      # This catches:
      #   * A stale checkout picking up an old copy of __main__.py.
      #   * A git ref pointing at code that pre-dates the fast-path.
      #   * A merge conflict left in the entry file.
      #   * A case-mismatch on Windows (installer\ vs Installer\).
      # -----------------------------------------------------------------
      - name: Verify entry-point sources contain current fast-path
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $entries = @(
              (Join-Path $env:GITHUB_WORKSPACE "agent_v2\installer\__main__.py"),
              (Join-Path $env:GITHUB_WORKSPACE "agent_v2\agent\__main__.py"),
              (Join-Path $env:GITHUB_WORKSPACE "agent_v2\uninstaller\__main__.py")
          )
          Write-Host "============================================================"
          Write-Host "VERIFYING ENTRY-POINT SOURCES"
          Write-Host "============================================================"
          $problems = 0
          foreach ($entry in $entries) {
              if (-not (Test-Path $entry -PathType Leaf)) {
                  Write-Host "::error::Missing entry file: $entry"
                  $problems++; continue
              }
              $sha  = (Get-FileHash -Algorithm SHA256 $entry).Hash.ToLower()
              $size = (Get-Item $entry).Length
              Write-Host ""
              Write-Host ("FILE   : {0}" -f $entry)
              Write-Host ("SIZE   : {0} bytes" -f $size)
              Write-Host ("SHA256 : {0}" -f $sha)
              $content = Get-Content $entry -Raw
              # Marker set that MUST be present in every entry point.
              $markers = @('_T0 = _time.perf_counter()',
                           'if "--self-test" in _sys.argv:',
                           'if "--version" in _sys.argv:',
                           'def _breadcrumb(',
                           'def _emergency_print(')
              # Derive the breadcrumb prefix from the PARENT DIRECTORY name
              # (installer / agent / uninstaller). Using the full path with
              # switch -Wildcard is a footgun: the path
              #   D:\a\YSBK\YSBK\agent_v2\installer\__main__.py
              # contains the substring "agent" (from "agent_v2"), so a
              # pattern like "*agent*" also matches the installer/uninstaller
              # files. That produced spurious "missing [agent.boot]" errors
              # in the 2026-07-16 build. Parent-dir name is unambiguous.
              $dirName = Split-Path -Path (Split-Path -Path $entry -Parent) -Leaf
              switch ($dirName) {
                  "installer"   { $markers += "[installer.boot]" }
                  "uninstaller" { $markers += "[uninstaller.boot]" }
                  "agent"       { $markers += "[agent.boot]" }
                  default       {
                      Write-Host "::error::Unexpected entry parent directory '$dirName' for $entry"
                      $problems++
                      continue
                  }
              }
              Write-Host ("MARKER : expecting [{0}.boot]" -f $dirName)
              $missing = @()
              foreach ($m in $markers) {
                  if ($content -notmatch [regex]::Escape($m)) {
                      $missing += $m
                  }
              }
              if ($missing.Count -gt 0) {
                  Write-Host "::error::Entry $entry is missing required markers:"
                  foreach ($m in $missing) { Write-Host ("::error::   - {0}" -f $m) }
                  $problems++
              } else {
                  Write-Host ("OK     : all {0} required markers present" -f $markers.Count)
              }
          }
          Write-Host ""
          Write-Host "============================================================"
          if ($problems -gt 0) {
              throw "$problems entry-point verification failure(s). Refusing to build a stale EXE."
          }
          Write-Host "PASS - every entry-point file contains the current fast-path implementation."

      - name: Build installer + agent + uninstaller
        shell: pwsh
        env:
          DIGITAL_TWIN_BACKEND_URL: ${{ steps.cfg.outputs.backend_url }}
        run: |
          powershell -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\agent_v2\build\build.ps1" `
              -Clean `
              -BackendUrl "$env:DIGITAL_TWIN_BACKEND_URL" `
              -OutputDir "$env:GITHUB_WORKSPACE\dist"

      - name: Verify EXE was produced
        shell: pwsh
        run: |
          $exe = "$env:GITHUB_WORKSPACE\dist\DigitalTwinAgentSetup.exe"
          if (-not (Test-Path $exe)) { throw "Build did not produce $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "Built: $exe ($size bytes)"
          $sha = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLower()
          Write-Host "SHA256: $sha"
          "$sha  DigitalTwinAgentSetup.exe" | Out-File "$env:GITHUB_WORKSPACE\dist\DigitalTwinAgentSetup.exe.sha256" -Encoding ascii

      # -----------------------------------------------------------------
      # Smoke-test frozen EXEs.
      #
      # This is the gate that catches the class of bug reported in
      # 2026-Q3 where a relative import inside installer/__main__.py made
      # DigitalTwinAgentSetup.exe crash on launch with
      #   ImportError: attempted relative import with no known parent package
      # even though PyInstaller reported success.
      #
      # Each EXE MUST:
      #   1. Exit 0 for  <exe> --version   within 30s (fast-path, no UAC)
      #   2. Exit 0 for  <exe> --self-test within 30s (fast-path, no UAC,
      #      no GUI, no service, no network, no admin check, no sleep)
      #
      # Any Python traceback in stderr, non-zero exit, OR wall-clock
      # timeout => the step fails => the build fails. The 30-second
      # per-invocation timeout guarantees the job cannot hang forever
      # (the previous version could, when a mandatory UAC manifest bit
      # blocked the process from starting in a non-interactive session).
      # -----------------------------------------------------------------
      - name: Smoke-test frozen EXEs (--version + --self-test, 30s hard timeout each)
        shell: pwsh
        timeout-minutes: 5
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "$env:GITHUB_WORKSPACE\dist"
          $installer = Join-Path $dist "DigitalTwinAgentSetup.exe"
          $agent      = Join-Path $dist "agent.exe"
          $uninst     = Join-Path $dist "uninstaller.exe"

          # IMPORTANT: do NOT name a parameter '$args'. In PowerShell, $args is
          # an automatic variable (the implicit array of unbound arguments to
          # every function). Declaring a param named $args does not reliably
          # override the automatic - the caller's positional args silently win
          # or the assignment is dropped, and the function ends up launching
          # the EXE with an EMPTY argument list. That triggers the full GUI
          # installer path (waiting for UAC in a non-interactive session),
          # which then hangs and is killed at 30s. Symptom in the log:
          #     SMOKE TIMEOUT: DigitalTwinAgentSetup.exe   did not exit ...
          # (note the missing argument between filename and 'did not exit').
          # The rename to $ExeArg (and passing as a single-element array via
          # @($ExeArg) to -ArgumentList) is what actually unblocks the build.
          function Invoke-Smoke([string]$exe, [string]$ExeArg, [int]$timeoutSec = 30) {
              Write-Host ""
              Write-Host ("[smoke] {0} {1} (timeout={2}s)" -f ([IO.Path]::GetFileName($exe)), $ExeArg, $timeoutSec)
              $stdoutFile = New-TemporaryFile
              $stderrFile = New-TemporaryFile
              $sw = [System.Diagnostics.Stopwatch]::StartNew()
              $p = Start-Process -FilePath $exe -ArgumentList @($ExeArg) -PassThru `
                    -NoNewWindow -RedirectStandardOutput $stdoutFile -RedirectStandardError $stderrFile
              $procId = $p.Id
              try {
                  # HARD WALL-CLOCK TIMEOUT. If the process is still
                  # running after $timeoutSec seconds (e.g. UAC prompt in
                  # a non-interactive session, a stray infinite loop, a
                  # blocking service call), kill it and fail the build.
                  $exited = $p.WaitForExit([int]($timeoutSec * 1000))
                  if (-not $exited) {
                      try { $p.Kill() } catch { }
                      $sw.Stop()
                      $stdoutPartial = ""
                      $stderrPartial = ""
                      try { $stdoutPartial = Get-Content $stdoutFile -Raw -ErrorAction SilentlyContinue } catch { }
                      try { $stderrPartial = Get-Content $stderrFile -Raw -ErrorAction SilentlyContinue } catch { }
                      if ($stdoutPartial) { Write-Host "----- stdout (partial, before kill) -----`n$stdoutPartial" }
                      if ($stderrPartial) { Write-Host "----- stderr (partial, before kill) -----`n$stderrPartial" }
                      Remove-Item $stdoutFile, $stderrFile -Force -ErrorAction SilentlyContinue
                      throw ("SMOKE TIMEOUT: {0} {1} did not exit within {2}s (killed)" -f ([IO.Path]::GetFileName($exe)), $ExeArg, $timeoutSec)
                  }
              } finally {
                  if ($sw.IsRunning) { $sw.Stop() }
              }

              # Force the .NET runtime to cache ExitCode. The timed
              # WaitForExit overload can return $true while $p.ExitCode is
              # still $null on windows-latest runners when stdio is
              # redirected. Calling the parameterless overload flushes it.
              try { [void]$p.WaitForExit() } catch { }

              $exitCode = $null
              try { $exitCode = $p.ExitCode } catch { $exitCode = $null }
              if ($null -eq $exitCode) {
                  try {
                      $reattached = [System.Diagnostics.Process]::GetProcessById($procId)
                      $exitCode   = $reattached.ExitCode
                  } catch {
                      if ($null -ne $LASTEXITCODE) { $exitCode = $LASTEXITCODE }
                  }
              }

              $elapsed = [math]::Round($sw.Elapsed.TotalSeconds, 2)
              $stdout  = Get-Content $stdoutFile -Raw
              $stderr  = Get-Content $stderrFile -Raw
              if ($stdout) { Write-Host ("----- stdout ({0}s) -----`n{1}" -f $elapsed, $stdout) }
              if ($stderr) { Write-Host ("----- stderr -----`n{0}" -f $stderr) }
              Remove-Item $stdoutFile, $stderrFile -Force -ErrorAction SilentlyContinue

              Write-Host ("[smoke]   diag: HasExited        = {0}" -f $p.HasExited)
              Write-Host ("[smoke]   diag: p.ExitCode raw   = '{0}'" -f $p.ExitCode)
              Write-Host ("[smoke]   diag: resolved exit    = '{0}'" -f $exitCode)
              Write-Host ("[smoke]   diag: LASTEXITCODE     = '{0}'" -f $LASTEXITCODE)

              if ($null -ne $exitCode -and $exitCode -ne 0) {
                  throw ("SMOKE FAIL: {0} {1} exited {2} after {3}s" -f ([IO.Path]::GetFileName($exe)), $ExeArg, $exitCode, $elapsed)
              }
              foreach ($needle in @("Traceback (most recent call last)",
                                    "ImportError: attempted relative import",
                                    "ModuleNotFoundError: No module named")) {
                  if ($stderr -and $stderr.Contains($needle)) {
                      throw ("SMOKE FAIL: {0} {1} produced Python error: {2}" -f ([IO.Path]::GetFileName($exe)), $ExeArg, $needle)
                  }
                  if ($stdout -and $stdout.Contains($needle)) {
                      throw ("SMOKE FAIL: {0} {1} produced Python error: {2}" -f ([IO.Path]::GetFileName($exe)), $ExeArg, $needle)
                  }
              }
              Write-Host ("[smoke] OK ({0}s)" -f $elapsed)
          }

          foreach ($exe in @($installer, $agent, $uninst)) {
              if (-not (Test-Path $exe)) { throw "Missing EXE for smoke test: $exe" }
              Invoke-Smoke -exe $exe -ExeArg "--version"   -timeoutSec 30
              Invoke-Smoke -exe $exe -ExeArg "--self-test" -timeoutSec 30
          }

          Write-Host ""
          Write-Host "[smoke] All three EXEs launched cleanly (no ImportError, exit 0, all within 30s each)."

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigitalTwinAgentSetup-windows-x64
          path: |
            dist/DigitalTwinAgentSetup.exe
            dist/DigitalTwinAgentSetup.exe.sha256
            dist/agent.exe
            dist/uninstaller.exe
          if-no-files-found: error

      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DigitalTwinAgentSetup.exe
            dist/DigitalTwinAgentSetup.exe.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
